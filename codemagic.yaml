workflows:
  ios-release:
    name: FidAPPti iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - fidappti_app_store_connect    # APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY
        - fidappti_ios_certificates     # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
    integrations:
      app_store_connect: fidappti_app_store_connect
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
