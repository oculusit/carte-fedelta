---
format_version: 11
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other

app:
  envs:
    - XCODE_SCHEME: App

trigger_map:
  - push_branch: master
    workflow: ios_build
  - pull_request_source_branch: "*"
    workflow: ios_build

workflows:
  ios_build:
    description: Build iOS simulator (debug, no signing needed)
    steps:
      - activate-ssh-key@4:
          run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
      - git-clone@8: {}
      - nvm@:
          inputs:
            - node_version: lts/*
      - npm@:
          inputs:
            - command: install
      - npm@:
          inputs:
            - command: run build
      - capacitor@:
          inputs:
            - command: sync ios
      - xcode-build-for-simulator@:
          inputs:
            - project_path: ios/App/App.xcodeproj
            - scheme: App
