<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="description" content="Gestisci le tue carte fedeltà con codici a barre" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="./api/manifest" />
  <link rel="icon" type="image/svg+xml" href="./api/site-logo" />
  <link rel="apple-touch-icon" href="./api/site-logo" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>FidAPPti</title>
  <script>
    if (typeof globalThis === 'undefined') {
      if (typeof self !== 'undefined') { self.globalThis = self; }
      else if (typeof window !== 'undefined') { window.globalThis = window; }
      else if (typeof global !== 'undefined') { global.globalThis = global; }
    }
    if (typeof crypto === 'undefined' || typeof crypto.randomUUID !== 'function') {
      var c = (typeof crypto !== 'undefined' && crypto.getRandomValues) ? crypto : { getRandomValues: function(a) { for (var i = 0; i < a.length; i++) a[i] = Math.floor(Math.random() * 256); return a; } };
      if (!crypto.randomUUID) {
        crypto.randomUUID = function() {
          var b = new Uint8Array(16);
          c.getRandomValues(b);
          b[6] = (b[6] & 0x0f) | 0x40;
          b[8] = (b[8] & 0x3f) | 0x80;
          var h = function(x) { return ('0' + x.toString(16)).slice(-2); };
          return [0,2,4,6,8,10].map(function(i){return h(b[i])}).join('') + '-' +
            [12,14].map(function(i){return h(b[i])}).join('') + '-' +
            h(b[6]) + h(b[7]) + '-' + h(b[8]) + h(b[9]) + '-' +
            [10,11,12,13,14,15].map(function(i){return h(b[i])}).join('');
        };
      }
    }
  </script>
  <script>
    // Capture beforeinstallprompt immediately, before Vue loads
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault()
      window.__pwaInstallPrompt = e
      console.log('PWA: beforeinstallprompt captured')
    })
    // Log SW status
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(function(reg) {
        console.log('PWA: SW ready', reg.active ? 'active' : 'inactive')
      })
    }
    // Global error display — saves to localStorage + shows on screen with copy button
    function __saveError(type, msg) {
      try {
        var log = JSON.parse(localStorage.getItem('error_log') || '[]')
        log.push({ t: Date.now(), type: type, msg: msg })
        if (log.length > 20) log = log.slice(-20)
        localStorage.setItem('error_log', JSON.stringify(log))
      } catch(e) {}
    }
    function __showError(title, msg) {
      __saveError(title, msg)
      document.body.innerHTML =
        '<div style="padding:16px;font-family:monospace;font-size:13px;background:#fff;color:#333;">' +
        '<h3 style="color:red;margin:0 0 8px">' + title + '</h3>' +
        '<pre style="white-space:pre-wrap;word-break:break-all;background:#f5f5f5;padding:12px;border-radius:8px;overflow:auto;max-height:60vh;">' + msg + '</pre>' +
        '<button onclick="navigator.clipboard.writeText(document.querySelector(\'pre\').textContent).then(function(){alert(\'Copiato!\')})" ' +
        'style="margin:12px 0;padding:10px 20px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Copia errore</button>' +
        '<br><button onclick="location.reload()" style="padding:10px 20px;background:#666;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Riprova</button>' +
        '</div>'
    }
    window.addEventListener('error', function(e) {
      var msg = 'ERROR: ' + (e.message || '') + '\nFile: ' + (e.filename || '') + ':' + (e.lineno || '') + ':' + (e.colno || '') + '\n' + (e.error && e.error.stack ? 'Stack:\n' + e.error.stack : '')
      __showError('Errore JavaScript', msg)
    })
    window.addEventListener('unhandledrejection', function(e) {
      var msg = 'UNHANDLED PROMISE:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason))
      __showError('Promise rifiutata', msg)
    })
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
